!
! FRR Configuration for dist-1 (gateway campus LAN — công ty NTC)
!
hostname dist-1
password zebra
enable password zebra
!
! Gateway VLAN 10 — phòng Kinh doanh
interface eth1.10
  ip address 172.16.10.1/24
!
! Gateway VLAN 20 — phòng Kỹ thuật
interface eth1.20
  ip address 172.16.20.1/24
!
line vty
!
! Bài này chỉ có Layer 2 + gateway — không cần routing protocol.
! (Sang bài 22, gateway .1 sẽ trở thành VRRP VIP khi thêm dist-2 dự phòng.)
!
