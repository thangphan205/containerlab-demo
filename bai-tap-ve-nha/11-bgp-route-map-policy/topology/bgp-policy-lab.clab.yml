name: bgp-policy-lab

topology:
  groups:
    routers:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1
    hosts:
      kind: linux
      image: wbitt/network-multitool:3.22.2

  nodes:
    srv1:
      group: hosts
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.10.10/24 dev eth1
        - ip route replace default via 192.168.10.1 dev eth1
    r-as100:
      group: routers
      binds:
        - ../configs/r-as100/daemons:/etc/frr/daemons
        - ../configs/r-as100/frr.conf:/etc/frr/frr.conf
    r-as200:
      group: routers
      binds:
        - ../configs/r-as200/daemons:/etc/frr/daemons
        - ../configs/r-as200/frr.conf:/etc/frr/frr.conf
    r-as300:
      group: routers
      binds:
        - ../configs/r-as300/daemons:/etc/frr/daemons
        - ../configs/r-as300/frr.conf:/etc/frr/frr.conf
    srv3:
      group: hosts
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.30.10/24 dev eth1
        - ip route replace default via 192.168.30.1 dev eth1

  links:
    - endpoints: ["srv1:eth1", "r-as100:eth1"]
    - endpoints: ["r-as100:eth2", "r-as200:eth1"]
    - endpoints: ["r-as200:eth2", "r-as300:eth1"]
    - endpoints: ["r-as100:eth3", "r-as300:eth2"]
    - endpoints: ["r-as300:eth3", "srv3:eth1"]
