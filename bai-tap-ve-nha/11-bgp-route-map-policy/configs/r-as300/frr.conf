!
! FRR Configuration for r-as300 (AS300)
!
hostname r-as300
password zebra
enable password zebra
!
! Interface toward r-as200 (transit)
interface eth1
  ip address 100.64.23.2/30
!
! Interface toward r-as100 (link trực tiếp / backup)
interface eth2
  ip address 100.64.13.2/30
!
! Interface toward srv3 (LAN AS300)
interface eth3
  ip address 192.168.30.1/24
!
line vty
!
! eBGP session đã lên sẵn cả 2 đường
router bgp 300
  bgp router-id 100.64.23.2
  no bgp ebgp-requires-policy
  neighbor 100.64.23.1 remote-as 200
  neighbor 100.64.13.1 remote-as 100
  !
  address-family ipv4 unicast
    network 192.168.30.0/24
  exit-address-family
!
! TODO: route-map — prepend AS-path khi quảng bá 192.168.30.0/24
! ra neighbor 100.64.13.1 (link trực tiếp), để AS100 ưu tiên đường
! qua r-as200 (transit) thay vì đi thẳng.
! Cần: 1 route-map dùng "set as-path prepend", gắn vào neighbor
! 100.64.13.1 theo chiều "out". Tự chọn tên route-map và số lần prepend.
!
