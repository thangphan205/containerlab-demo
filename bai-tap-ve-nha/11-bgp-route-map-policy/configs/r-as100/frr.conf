!
! FRR Configuration for r-as100 (AS100)
!
hostname r-as100
password zebra
enable password zebra
!
! Interface toward srv1 (LAN AS100)
interface eth1
  ip address 192.168.10.1/24
!
! Interface toward r-as200 (transit)
interface eth2
  ip address 100.64.12.1/30
!
! Interface toward r-as300 (link trực tiếp / backup)
interface eth3
  ip address 100.64.13.1/30
!
line vty
!
! eBGP session đã lên sẵn cả 2 đường
router bgp 100
  bgp router-id 100.64.12.1
  no bgp ebgp-requires-policy
  neighbor 100.64.12.2 remote-as 200
  neighbor 100.64.13.2 remote-as 300
  !
  address-family ipv4 unicast
    network 192.168.10.0/24
  exit-address-family
!
! TODO: route-map — prepend AS-path khi quảng bá 192.168.10.0/24
! ra neighbor 100.64.13.2 (link trực tiếp), để AS300 ưu tiên đường
! qua r-as200 (transit) thay vì đi thẳng.
! Cần: 1 route-map dùng "set as-path prepend", gắn vào neighbor
! 100.64.13.2 theo chiều "out". Tự chọn tên route-map và số lần prepend.
!
