name: nft-lab

topology:
  nodes:
    host-a:
      kind: linux
      image: wbitt/network-multitool:3.22.2
    gw:
      kind: linux
      image: wbitt/network-multitool:3.22.2
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - apk add --no-cache nftables
    host-b:
      kind: linux
      image: wbitt/network-multitool:3.22.2

  links:
    - endpoints: ["host-a:eth1", "gw:eth1"]
    - endpoints: ["gw:eth2", "host-b:eth1"]
