!
! FRR Configuration for r-as200 (AS200)
!
hostname r-as200
password zebra
enable password zebra
!
! Interface toward r-as100 (eBGP link)
interface eth1
  ip address 100.64.0.2/30
!
! Interface toward srv2 (LAN AS200)
interface eth2
  ip address 192.168.20.1/24
!
line vty
!
! TODO: cấu hình eBGP tại đây
! - router bgp 200
! - bgp router-id <chọn 1 IP duy nhất>
! - no bgp ebgp-requires-policy (FRR 10.x mặc định yêu cầu route-map cho eBGP theo
!   RFC 8212 — nếu bỏ qua dòng này, session vẫn lên Established nhưng KHÔNG trao
!   đổi được route nào, dễ gây nhầm lẫn)
! - neighbor 100.64.0.1 remote-as 100
! - quảng bá 192.168.20.0/24 bằng "network" statement trong address-family
!   ipv4 unicast (không dùng redistribute connected — nó sẽ quảng bá luôn cả
!   subnet quản lý 172.20.20.0/24 của containerlab, gây nhiễu)
!
