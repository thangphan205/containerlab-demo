name: dhcp-lab
prefix: ""

topology:
  nodes:
    r1:
      kind: linux
      image: wbitt/network-multitool:3.22.2
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.1.1/24 dev eth1
        - ip addr add 10.0.2.1/24 dev eth2
        - ip addr add 10.0.0.1/24 dev eth3
        - apk add --no-cache dnsmasq
    host-a:
      kind: linux
      image: wbitt/network-multitool:3.22.2
    host-b:
      kind: linux
      image: wbitt/network-multitool:3.22.2
    srv:
      kind: linux
      image: wbitt/network-multitool:3.22.2
      exec:
        - ip addr add 10.0.0.10/24 dev eth1
        - ip route replace default via 10.0.0.1 dev eth1

  links:
    - endpoints: ["host-a:eth1", "r1:eth1"]
    - endpoints: ["host-b:eth1", "r1:eth2"]
    - endpoints: ["r1:eth3", "srv:eth1"]
