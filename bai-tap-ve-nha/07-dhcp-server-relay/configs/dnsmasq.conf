# dnsmasq.conf — DHCP server cho R1
# Dùng cho bài 07: DHCP Server trên Linux

# Không forward DNS query (bài này chỉ tập trung DHCP)
port=0

# Chỉ phục vụ DHCP trên interface LAN, không serve trên eth0 (mgmt containerlab)
except-interface=eth0
except-interface=eth3
bind-interfaces

# Log DHCP (debug)
log-dhcp

# TODO: thêm dhcp-range cho 2 subnet
# Cú pháp: dhcp-range=<interface>,<start-ip>,<end-ip>,<netmask>,<lease-time>
#
# Subnet 10.0.1.0/24 (eth1): pool 10.0.1.100 – 10.0.1.200, lease 1 giờ
# dhcp-range=...
#
# Subnet 10.0.2.0/24 (eth2): pool 10.0.2.100 – 10.0.2.200, lease 1 giờ
# dhcp-range=...

# TODO: thêm dhcp-option cấp default gateway cho từng subnet
# Cú pháp: dhcp-option=<interface>,3,<gateway-ip>
#
# Gateway cho subnet eth1
# dhcp-option=...
#
# Gateway cho subnet eth2
# dhcp-option=...
