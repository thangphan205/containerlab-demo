!
! FRR Configuration for R1 (VRRP master, OSPF area 0)
!
hostname r1
password zebra
enable password zebra
!
! Interface toward LAN (via switch)
interface eth1
  ip address 10.0.10.2/24
!
! Interface toward backbone
interface eth2
  ip address 10.0.12.1/30
!
line vty
!
! OSPF — đã cấu hình sẵn
router ospf
  ospf router-id 10.0.12.1
  network 10.0.10.0/24 area 0
  network 10.0.12.0/30 area 0
!
! TODO: cấu hình VRRP trên interface eth1
! - vrrp 10
! - vrrp 10 ip 10.0.10.1
! - vrrp 10 priority 200  (R1 là master, priority cao hơn R2)
!
