!
! FRR Configuration for backbone router (OSPF area 0)
!
hostname backbone
password zebra
enable password zebra
!
! Interface toward R1
interface eth1
  ip address 10.0.12.2/30
!
! Interface toward R2
interface eth2
  ip address 10.0.13.2/30
!
! Loopback for testing
interface lo
  ip address 10.0.99.1/32
!
line vty
!
! OSPF — backbone nhận route từ cả R1 và R2 (ECMP)
router ospf
  ospf router-id 10.0.99.1
  network 10.0.12.0/30 area 0
  network 10.0.13.0/30 area 0
  network 10.0.99.1/32 area 0
!
