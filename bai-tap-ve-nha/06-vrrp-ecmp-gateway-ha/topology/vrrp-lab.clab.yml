name: vrrp-lab

topology:
  groups:
    routers:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1
    hosts:
      kind: linux
      image: wbitt/network-multitool:3.22.2

  nodes:
    host-a:
      group: hosts
    host-b:
      group: hosts
    sw:
      kind: linux
      image: wbitt/network-multitool:3.22.2
      exec:
        - ip link add name br0 type bridge
        - ip link set br0 up
        - ip link set eth1 master br0
        - ip link set eth2 master br0
        - ip link set eth3 master br0
        - ip link set eth4 master br0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
        - ip link set eth4 up
        # Tắt multicast snooping — mặc định bridge Linux snoop multicast nhưng VRRP không gửi IGMP join,
        # khiến advertisement (224.0.0.18) tới thất thường, có thể gây split-brain thoáng qua giữa R1/R2.
        # (xem "Troubleshooting" trong doc/user/vrrp.rst upstream FRR)
        - sh -c "echo 0 > /sys/devices/virtual/net/br0/bridge/multicast_snooping"
    r1:
      group: routers
      binds:
        - ../configs/r1/daemons:/etc/frr/daemons
        - ../configs/r1/frr.conf:/etc/frr/frr.conf
      exec:
        # FRR vrrpd không tự tạo macvlan giữ VIP — phải tạo tay trước (xem doc/user/vrrp.rst upstream).
        # addrgenmode random bị bỏ vì gây lỗi "Address family not supported" trên kernel host lab (chỉ cần cho IPv6 VRRP, lab này chỉ dùng IPv4).
        - ip link add vrrp-eth1-10 link eth1 type macvlan mode bridge
        - ip link set dev vrrp-eth1-10 address 00:00:5e:00:01:0a
        - ip addr add 10.0.10.1/24 dev vrrp-eth1-10
        - ip link set dev vrrp-eth1-10 up
    r2:
      group: routers
      binds:
        - ../configs/r2/daemons:/etc/frr/daemons
        - ../configs/r2/frr.conf:/etc/frr/frr.conf
      exec:
        - ip link add vrrp-eth1-10 link eth1 type macvlan mode bridge
        - ip link set dev vrrp-eth1-10 address 00:00:5e:00:01:0a
        - ip addr add 10.0.10.1/24 dev vrrp-eth1-10
        - ip link set dev vrrp-eth1-10 up
    backbone:
      group: routers
      binds:
        - ../configs/backbone/daemons:/etc/frr/daemons
        - ../configs/backbone/frr.conf:/etc/frr/frr.conf

  links:
    # Hosts to switch
    - endpoints: ["host-a:eth1", "sw:eth1"]
    - endpoints: ["host-b:eth1", "sw:eth2"]
    # Switch to routers (same LAN segment)
    - endpoints: ["sw:eth3", "r1:eth1"]
    - endpoints: ["sw:eth4", "r2:eth1"]
    # Routers to backbone
    - endpoints: ["r1:eth2", "backbone:eth1"]
    - endpoints: ["r2:eth2", "backbone:eth2"]
