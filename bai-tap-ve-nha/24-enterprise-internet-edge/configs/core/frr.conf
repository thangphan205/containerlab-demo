!
! FRR Configuration for core — OSPF (tuần 2) + eBGP (tuần 3) đã hoàn chỉnh.
! Tuần 4: bạn hoàn thiện việc phát tán default route ra toàn công ty.
!
hostname core
password zebra
enable password zebra
!
interface eth1
  ip address 10.0.13.2/30
!
interface eth2
  ip address 10.0.23.2/30
!
interface eth3
  ip address 172.16.30.1/24
  ip ospf passive
!
interface eth4
  ip address 10.0.35.1/30
!
! Uplink ra internet edge
interface eth5
  ip address 10.0.34.1/30
!
line vty
!
router ospf
  ospf router-id 10.255.0.3
  network 10.0.13.0/30 area 0
  network 10.0.23.0/30 area 0
  network 172.16.30.0/24 area 0
  redistribute bgp
!
router bgp 65010
  bgp router-id 10.255.0.3
  no bgp ebgp-requires-policy
  neighbor 10.0.35.2 remote-as 65020
  address-family ipv4 unicast
    network 172.16.10.0/24
    network 172.16.20.0/24
    network 172.16.30.0/24
  exit-address-family
!
! TODO: phát tán default route (internet breakout tập trung tại HQ)
! 1. Static default về edge:  ip route 0.0.0.0/0 10.0.34.2
! 2. Trong "router ospf": default-information originate
!    (dist-1/dist-2 sẽ học O*E2 0.0.0.0/0 — KHÔNG gõ static trên dist)
! 3. Trong address-family ipv4 unicast của "router bgp":
!    neighbor 10.0.35.2 default-originate
!    (chi nhánh học default qua BGP -> mọi traffic internet của chi nhánh
!    đổ về HQ — mô hình centralized breakout, kiểm soát tại 1 cửa)
!
