!
! FRR Configuration for br-rtr — eBGP tuần 3 đã hoàn chỉnh (AS 65020)
!
hostname br-rtr
password zebra
enable password zebra
!
interface eth1
  ip address 10.0.35.2/30
!
interface eth2
  ip address 172.16.40.1/24
!
line vty
!
router bgp 65020
  bgp router-id 10.255.0.5
  no bgp ebgp-requires-policy
  neighbor 10.0.35.1 remote-as 65010
  address-family ipv4 unicast
    network 172.16.40.0/24
  exit-address-family
!
