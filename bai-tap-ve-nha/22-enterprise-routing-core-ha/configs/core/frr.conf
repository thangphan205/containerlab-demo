!
! FRR Configuration for core (router lõi — công ty NTC)
!
hostname core
password zebra
enable password zebra
!
! Downlink từ dist-1
interface eth1
  ip address 10.0.13.2/30
!
! Downlink từ dist-2
interface eth2
  ip address 10.0.23.2/30
!
! Server farm — ứng dụng ERP
interface eth3
  ip address 172.16.30.1/24
!
line vty
!
! TODO: cấu hình OSPF area 0
! - router ospf
! - ospf router-id 10.255.0.3
! - quảng bá: 10.0.13.0/30, 10.0.23.0/30, 172.16.30.0/24 (area 0)
! - bật passive: thêm "ip ospf passive" dưới "interface eth3" (server farm không chạy OSPF)
!
