!
! FRR Configuration for dist-2 (gateway VLAN dự phòng — công ty NTC)
! Tuần 2: dist-2 dự kiến là VRRP MASTER cho VLAN 20, BACKUP cho VLAN 10.
!
hostname dist-2
password zebra
enable password zebra
!
! Gateway VLAN 10 — IP thật của dist-2 (VIP 172.16.10.1 do VRRP quản lý)
interface eth1.10
  ip address 172.16.10.3/24
!
! Gateway VLAN 20 — IP thật của dist-2 (VIP 172.16.20.1 do VRRP quản lý)
interface eth1.20
  ip address 172.16.20.3/24
!
! Uplink về core
interface eth2
  ip address 10.0.23.1/30
!
line vty
!
! TODO 1: cấu hình OSPF area 0
! - router ospf
! - ospf router-id 10.255.0.2
! - quảng bá: 10.0.23.0/30, 172.16.10.0/24, 172.16.20.0/24 (area 0)
! - bật passive: thêm "ip ospf passive" dưới "interface eth1.10" và "interface eth1.20"
!
! TODO 2: cấu hình VRRP — NGƯỢC priority với dist-1
! - interface eth1.10:  vrrp 10 / vrrp 10 ip 172.16.10.1 / vrrp 10 priority 100
! - interface eth1.20:  vrrp 20 / vrrp 20 ip 172.16.20.1 / vrrp 20 priority 200
!
