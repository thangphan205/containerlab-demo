!
! FRR Configuration for dist-1 (gateway VLAN — công ty NTC)
! Tuần 2: dist-1 dự kiến là VRRP MASTER cho VLAN 10, BACKUP cho VLAN 20.
!
hostname dist-1
password zebra
enable password zebra
!
! Gateway VLAN 10 — IP thật của dist-1 (VIP 172.16.10.1 do VRRP quản lý)
interface eth1.10
  ip address 172.16.10.2/24
!
! Gateway VLAN 20 — IP thật của dist-1 (VIP 172.16.20.1 do VRRP quản lý)
interface eth1.20
  ip address 172.16.20.2/24
!
! Uplink về core
interface eth2
  ip address 10.0.13.1/30
!
line vty
!
! TODO 1: cấu hình OSPF area 0
! - router ospf
! - ospf router-id 10.255.0.1
! - quảng bá các mạng: 10.0.13.0/30, 172.16.10.0/24, 172.16.20.0/24 (đều area 0)
! - bật passive phía người dùng: vào "interface eth1.10" và "interface eth1.20",
!   thêm "ip ospf passive" (không bắt tay OSPF với PC — giảm rủi ro bảo mật.
!   Lưu ý: lệnh "passive-interface" trong "router ospf" đã deprecated ở FRR 10.x)
!
! TODO 2: cấu hình VRRP (macvlan vrrp4-10/vrrp4-20 + VIP đã tạo sẵn bởi topology)
! - interface eth1.10:  vrrp 10 / vrrp 10 ip 172.16.10.1 / vrrp 10 priority 200
!   (priority 200 > 100 => dist-1 là master VLAN 10)
! - interface eth1.20:  vrrp 20 / vrrp 20 ip 172.16.20.1 / vrrp 20 priority 100
!   (dist-2 sẽ đặt ngược lại => chia tải: mỗi dist gánh 1 VLAN, dự phòng cho nhau)
!
