name: hello-clab

topology:
  nodes:
    host1:
      kind: linux
      image: wbitt/network-multitool:3.22.2
      exec:
        - ip addr add 192.168.100.1/24 dev eth1
    host2:
      kind: linux
      image: wbitt/network-multitool:3.22.2
      exec:
        - ip addr add 192.168.100.2/24 dev eth1

  links:
    - endpoints: ["host1:eth1", "host2:eth1"]
