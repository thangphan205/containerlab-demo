name: subnet-lab

topology:
  nodes:
    gw:
      kind: linux
      image: wbitt/network-multitool:3.22.2
      exec:
        - sysctl -w net.ipv4.ip_forward=1
    host-a:
      kind: linux
      image: wbitt/network-multitool:3.22.2
    host-b:
      kind: linux
      image: wbitt/network-multitool:3.22.2
    host-c:
      kind: linux
      image: wbitt/network-multitool:3.22.2

  links:
    - endpoints: ["gw:eth1", "host-a:eth1"]
    - endpoints: ["gw:eth2", "host-b:eth1"]
    - endpoints: ["gw:eth3", "host-c:eth1"]
