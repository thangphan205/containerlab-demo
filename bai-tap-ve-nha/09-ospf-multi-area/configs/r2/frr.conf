!
! FRR Configuration for R2 (ABR: area 1 <-> area 0)
!
hostname r2
password zebra
enable password zebra
!
! Interface toward R1 (area 1)
interface eth1
  ip address 10.12.0.2/30
!
! Interface toward R3 (area 0 - backbone)
interface eth2
  ip address 10.23.0.1/30
!
line vty
!
! TODO: cấu hình OSPF tại đây — R2 là ABR
! - router ospf
! - router-id <chọn 1 IP duy nhất>
! - network cho eth1 thuộc area 1
! - network cho eth2 thuộc area 0
!
