!
! FRR Configuration for R4 (Area 2 - internal)
!
hostname r4
password zebra
enable password zebra
!
! Interface toward R3 (area 2)
interface eth1
  ip address 10.34.0.2/30
!
! Interface toward srv2 (area 2)
interface eth2
  ip address 10.4.4.1/24
!
line vty
