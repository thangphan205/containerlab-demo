!
! FRR Configuration for R1 (Area 1 - internal)
!
hostname r1
password zebra
enable password zebra
!
! Interface toward srv1 (area 1)
interface eth1
  ip address 10.1.1.1/24
!
! Interface toward R2 (area 1)
interface eth2
  ip address 10.12.0.1/30
!
line vty
