!
! FRR Configuration for R3 (ABR: area 0 <-> area 2)
!
hostname r3
password zebra
enable password zebra
!
! Interface toward R2 (area 0 - backbone)
interface eth1
  ip address 10.23.0.2/30
!
! Interface toward R4 (area 2)
interface eth2
  ip address 10.34.0.1/30
!
line vty
!
! TODO: cấu hình OSPF tại đây — R3 là ABR
! - router ospf
! - router-id <chọn 1 IP duy nhất>
! - network cho eth1 thuộc area 0
! - network cho eth2 thuộc area 2
!
