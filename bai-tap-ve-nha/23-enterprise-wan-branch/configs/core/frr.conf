!
! FRR Configuration for core — OSPF tuần 2 đã hoàn chỉnh.
! Tuần 3: core kiêm WAN router phía HQ (AS 65010) — bạn cấu hình eBGP.
!
hostname core
password zebra
enable password zebra
!
interface eth1
  ip address 10.0.13.2/30
!
interface eth2
  ip address 10.0.23.2/30
!
interface eth3
  ip address 172.16.30.1/24
  ip ospf passive
!
! WAN kênh thuê riêng tới chi nhánh Hà Nội
interface eth4
  ip address 10.0.35.1/30
!
line vty
!
router ospf
  ospf router-id 10.255.0.3
  network 10.0.13.0/30 area 0
  network 10.0.23.0/30 area 0
  network 172.16.30.0/24 area 0
!
! TODO 1: cấu hình eBGP phía HQ
! - router bgp 65010
! - bgp router-id 10.255.0.3
! - no bgp ebgp-requires-policy   (FRR 10.x mặc định theo RFC 8212 — thiếu dòng này
!   session vẫn Established nhưng KHÔNG trao đổi route nào)
! - neighbor 10.0.35.2 remote-as 65020
! - address-family ipv4 unicast: quảng bá 172.16.10.0/24, 172.16.20.0/24,
!   172.16.30.0/24 bằng "network" statement (KHÔNG dùng redistribute connected —
!   sẽ quảng bá nhầm subnet mgmt 172.20.20.0/24 của containerlab)
!
! TODO 2: cho toàn HQ biết đường tới chi nhánh
! - trong "router ospf": redistribute bgp
!   (dist-1/dist-2 sẽ học 172.16.40.0/24 dưới dạng OSPF external E2)
!
