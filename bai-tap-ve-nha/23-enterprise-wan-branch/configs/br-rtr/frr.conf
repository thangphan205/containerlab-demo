!
! FRR Configuration for br-rtr — router chi nhánh Hà Nội (AS 65020)
! Tuần 3: bạn cấu hình eBGP phía chi nhánh.
!
hostname br-rtr
password zebra
enable password zebra
!
! WAN kênh thuê riêng về HQ
interface eth1
  ip address 10.0.35.2/30
!
! LAN chi nhánh
interface eth2
  ip address 172.16.40.1/24
!
line vty
!
! TODO: cấu hình eBGP phía chi nhánh
! - router bgp 65020
! - bgp router-id 10.255.0.5
! - no bgp ebgp-requires-policy
! - neighbor 10.0.35.1 remote-as 65010
! - address-family ipv4 unicast: quảng bá 172.16.40.0/24 bằng "network" statement
!
