name: iproute2-tc-demo

mgmt:
  network: mgmt
  ipv4-subnet: 192.168.5.0/24

topology:
  nodes:
    client:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 192.168.5.11
      exec:
        - apk add --no-cache iperf3
        - ip addr add 192.168.12.2/24 dev eth1
        - ip route add 192.168.0.0/16 via 192.168.12.1
      cmd: sh -c "tail -f /dev/null"
    router:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 192.168.5.12
      sysctls:
        net.ipv4.ip_forward: 1
      exec:
        - apk add --no-cache iproute2 tcpdump
        - ip addr add 192.168.12.1/24 dev eth1
        - ip addr add 192.168.23.1/24 dev eth2
      cmd: sh -c "tail -f /dev/null"
    server:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 192.168.5.13
      exec:
        - apk add --no-cache iperf3
        - ip addr add 192.168.23.2/24 dev eth1
        - ip route add 192.168.0.0/16 via 192.168.23.1
      cmd: sh -c "tail -f /dev/null"
  links:
    - endpoints: ["client:eth1", "router:eth1"]
    - endpoints: ["router:eth2", "server:eth1"]
