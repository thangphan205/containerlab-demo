!
! FRR Configuration for Group2-Router-C2
! AS20, ISIS IGP, iBGP and eBGP (Route Reflector)
!
hostname router-C2
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.2.2/32
  ipv6 address 2001:db8:2:2::1/128
  ip router isis AREA20
  ipv6 router isis AREA20
!
! Interface eth1 to router-B2
interface eth1
  ip address 100.68.2.16/31
  ipv6 address 2001:db8:2:16::1/64
  ip router isis AREA20
  ipv6 router isis AREA20
  isis metric 10
!
! Interface eth2 to router-P2
interface eth2
  ip address 100.68.2.18/31
  ipv6 address 2001:db8:2:18::1/64
  ip router isis AREA20
  ipv6 router isis AREA20
  isis metric 10
!
! Interface eth3 to router-A2
interface eth3
  ip address 100.68.2.20/31
  ipv6 address 2001:db8:2:20::1/64
  ip router isis AREA20
  ipv6 router isis AREA20
  isis metric 10
!
! Interface eth4 to server-SRV2
interface eth4
  ip address 100.68.2.29/30
  ipv6 address 2001:db8:2:29::1/64
!
! ISIS configuration for Group2 (AS20)
router isis AREA20
  net 49.0001.0020.0002.0002.00
  !
  address-family ipv4 unicast
    redistribute connected
  exit-address-family
  !
  address-family ipv6 unicast
    redistribute connected
  exit-address-family
!
! iBGP and eBGP for Group2 (AS20) - Route Reflector
router bgp 20
  bgp router-id 100.68.2.2
  bgp bestpath as-path multipath-relax
  !
  ! iBGP neighbor to B2
  neighbor 100.68.2.1 remote-as 20
  neighbor 100.68.2.1 description iBGP to B2
  neighbor 100.68.2.1 update-source lo
  !
  ! iBGP neighbor to A2
  neighbor 100.68.2.4 remote-as 20
  neighbor 100.68.2.4 description iBGP to A2
  neighbor 100.68.2.4 update-source lo
  !
  ! iBGP neighbor to P2
  neighbor 100.68.2.3 remote-as 20
  neighbor 100.68.2.3 description iBGP to P2
  neighbor 100.68.2.3 update-source lo
  !
  address-family ipv4 unicast
    network 100.68.2.2/32
    neighbor 100.68.2.1 activate
    neighbor 100.68.2.1 route-reflector-client
    neighbor 100.68.2.4 activate
    neighbor 100.68.2.4 route-reflector-client
    neighbor 100.68.2.3 activate
    neighbor 100.68.2.3 route-reflector-client
  exit-address-family
!
line vty
!
