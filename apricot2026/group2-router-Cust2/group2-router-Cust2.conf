!
! FRR Configuration for Group2-Router-Cust2
! Customer router in Group2 (AS65002)
!
hostname router-Cust2
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.2.35/32
  ipv6 address 2001:db8:2:35::1/128
!
! Interface eth1 to router-A2
interface eth1
  ip address 100.68.2.35/31
  ipv6 address 2001:db8:2:35::2/64
!
! eBGP to Group2-Router-A2 (AS20)
router bgp 65002
  bgp router-id 100.68.2.35
  !
  ! eBGP neighbor to A2 (AS20)
  neighbor 100.68.2.34 remote-as 20
  neighbor 100.68.2.34 description eBGP to A2
  !
  address-family ipv4 unicast
    network 100.68.2.35/32
    neighbor 100.68.2.34 activate
  exit-address-family
!
line vty
!
