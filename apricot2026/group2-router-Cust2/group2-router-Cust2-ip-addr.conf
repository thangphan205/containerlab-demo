!
! FRR Configuration for Group2-Router-Cust2
! Customer router in Group2 (AS65002)
!
hostname router-Cust2
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.2.5/32
  ipv6 address 2001:db8:2::5/128
!
! Interface eth1 to router-A2
interface eth1
  ip address 100.68.2.35/31
  ipv6 address 2001:db8:2:35::2/64
!
