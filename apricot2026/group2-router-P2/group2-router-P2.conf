!
! FRR Configuration for Group2-Router-P2
! AS20, ISIS IGP, iBGP and eBGP
!
hostname router-P2
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.2.3/32
  ipv6 address 2001:db8:2:3::1/128
  ip router isis AREA20
  ipv6 router isis AREA20
!
! Interface eth1 to router-C2
interface eth1
  ip address 100.68.2.19/31
  ipv6 address 2001:db8:2:19::1/64
  ip router isis AREA20
  ipv6 router isis AREA20
  isis metric 10
!
! ISIS configuration for Group2 (AS20)
router isis AREA20
  net 49.0001.0020.0002.0003.00
  !
  address-family ipv4 unicast
    redistribute connected
  exit-address-family
  !
  address-family ipv6 unicast
    redistribute connected
  exit-address-family
!
! iBGP and eBGP for Group2 (AS20)
router bgp 20
  bgp router-id 100.68.2.3
  bgp bestpath as-path multipath-relax
  !
  ! iBGP neighbor to C2 (route reflector client)
  neighbor 100.68.2.2 remote-as 20
  neighbor 100.68.2.2 description iBGP to C2
  neighbor 100.68.2.2 update-source lo
  !
  address-family ipv4 unicast
    network 100.68.2.3/32
    neighbor 100.68.2.2 activate
    neighbor 100.68.2.2 route-reflector-client
  exit-address-family
!
line vty
!
