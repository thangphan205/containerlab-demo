!
! FRR Configuration for Group1-Router-P1
! AS10, OSPF IGP, iBGP and eBGP
!
hostname router-P1
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.1.3/32
  ipv6 address 2001:db8:1:3::1/128
  ip ospf cost 1
!
! Interface eth1 to router-C1
interface eth1
  ip address 100.68.1.19/31
  ipv6 address 2001:db8:1:19::1/64
  ip ospf cost 10
!
! OSPF configuration for Group1 (AS10)
router ospf
  router-id 100.68.1.3
  network 100.68.1.0/25 area 0
  network 100.68.1.3/32 area 0
  redistribute connected
!
! iBGP and eBGP for Group1 (AS10)
router bgp 10
  bgp router-id 100.68.1.3
  bgp bestpath as-path multipath-relax
  !
  ! iBGP neighbor to C1 (route reflector client)
  neighbor 100.68.1.2 remote-as 10
  neighbor 100.68.1.2 description iBGP to C1
  neighbor 100.68.1.2 update-source lo
  !
  address-family ipv4 unicast
    network 100.68.1.3/32
    neighbor 100.68.1.2 activate
    neighbor 100.68.1.2 route-reflector-client
  exit-address-family
!
line vty
!
