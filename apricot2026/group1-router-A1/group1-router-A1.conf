!
! FRR Configuration for Group1-Router-A1
! AS10, OSPF IGP, iBGP and eBGP
!
hostname router-A1
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.1.4/32
  ipv6 address 2001:db8:1::4/128
  ip ospf cost 1
!
! Interface eth1 to router-C1
interface eth1
  ip address 100.68.1.21/31
  ipv6 address 2001:db8:1:21::1/64
  ip ospf cost 10
!
! Interface eth2 to router-Cust1
interface eth2
  ip address 100.68.1.34/31
  ipv6 address 2001:db8:1:34::1/64
!
! OSPF configuration for Group1 (AS10)
router ospf
  router-id 100.68.1.4
  network 100.68.1.0/25 area 0
  network 100.68.1.4/32 area 0
  redistribute connected
!
! iBGP and eBGP for Group1 (AS10)
router bgp 10
  bgp router-id 100.68.1.4
  bgp bestpath as-path multipath-relax
  !
  ! iBGP neighbor to C1 (route reflector client)
  neighbor 100.68.1.2 remote-as 10
  neighbor 100.68.1.2 description iBGP to C1
  neighbor 100.68.1.2 update-source lo
  !
  ! eBGP neighbor to Cust1 (AS65001)
  neighbor 100.68.1.35 remote-as 65001
  neighbor 100.68.1.35 description eBGP to Cust1
  !
  address-family ipv4 unicast
    network 100.68.1.4/32
    neighbor 100.68.1.2 activate
    neighbor 100.68.1.35 activate
  exit-address-family
!
line vty
!
