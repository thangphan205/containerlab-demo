!
! FRR Configuration for Group2-Router-A2
! AS20, ISIS IGP, iBGP and eBGP
!
hostname router-A2
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.2.4/32
  ipv6 address 2001:db8:2:4::1/128
  ip router isis AREA20
  ipv6 router isis AREA20
!
! Interface eth1 to router-C2
interface eth1
  ip address 100.68.2.21/31
  ipv6 address 2001:db8:2:21::1/64
  ip router isis AREA20
  ipv6 router isis AREA20
  isis metric 10
!
! Interface eth2 to router-Cust2
interface eth2
  ip address 100.68.2.34/31
  ipv6 address 2001:db8:2:34::1/64
!
! ISIS configuration for Group2 (AS20)
router isis AREA20
  net 49.0001.0020.0002.0004.00
  !
  address-family ipv4 unicast
    redistribute connected
  exit-address-family
  !
  address-family ipv6 unicast
    redistribute connected
  exit-address-family
!
! iBGP and eBGP for Group2 (AS20)
router bgp 20
  bgp router-id 100.68.2.4
  bgp bestpath as-path multipath-relax
  !
  ! iBGP neighbor to C2 (route reflector client)
  neighbor 100.68.2.2 remote-as 20
  neighbor 100.68.2.2 description iBGP to C2
  neighbor 100.68.2.2 update-source lo
  !
  ! eBGP neighbor to Cust2 (AS65002)
  neighbor 100.68.2.35 remote-as 65002
  neighbor 100.68.2.35 description eBGP to Cust2
  !
  address-family ipv4 unicast
    network 100.68.2.4/32
    neighbor 100.68.2.2 activate
    neighbor 100.68.2.2 route-reflector-client
    neighbor 100.68.2.35 activate
  exit-address-family
!
line vty
!
