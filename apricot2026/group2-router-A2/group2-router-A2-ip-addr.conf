!
! FRR Configuration for Group2-Router-A2
! AS20, ISIS IGP, iBGP and eBGP
!
hostname router-A2
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.2.4/32
  ipv6 address 2001:db8:2::4/128
!
! Interface eth1 to router-C2
interface eth1
  ip address 100.68.2.21/31
  ipv6 address 2001:db8:2:21::1/64
!
! Interface eth2 to router-Cust2
interface eth2
  ip address 100.68.2.34/31
  ipv6 address 2001:db8:2:34::1/64
!
