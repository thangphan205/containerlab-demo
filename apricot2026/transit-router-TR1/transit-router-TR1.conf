!
! FRR Configuration for Transit-Router-TR1
! AS121, Transit ASN, eBGP with AS10 and AS20
!
hostname router-TR1
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.121.1.0/32
  ipv6 address 2001:121:1:0::1/128
!
! Interface eth1 to Group1-Router-B1
interface eth1
  ip address 100.121.1.0/31
  ipv6 address 2001:121:1::0/64
!
! Interface eth2 to Group2-Router-B2
interface eth2
  ip address 100.121.2.2/31
  ipv6 address 2001:121:2::2/64
!
! Prefix lists for incoming routes from groups
ip prefix-list GROUP1-AGGREGATE permit 100.68.1.0/24
ip prefix-list GROUP2-AGGREGATE permit 100.68.2.0/24
ip prefix-list FULL-ROUTESv4 permit 0.0.0.0/0 le 32
!
ipv6 prefix-list GROUP1-AGGREGATE-v6 permit 2001:db8:1::/48
ipv6 prefix-list GROUP2-AGGREGATE-v6 permit 2001:db8:2::/48
ipv6 prefix-list FULL-ROUTESv6 permit ::/0 le 128
!
! Inbound route-maps for accepting aggregates from groups
route-map FromGROUP1v4-in permit 5
  description Accept GROUP1 aggregate
  match ip address prefix-list GROUP1-AGGREGATE
!
route-map FromGROUP1v4-in permit 10
  description Accept full routes from GROUP1
  match ip address prefix-list FULL-ROUTESv4
!
route-map FromGROUP2v4-in permit 5
  description Accept GROUP2 aggregate
  match ip address prefix-list GROUP2-AGGREGATE
!
route-map FromGROUP2v4-in permit 10
  description Accept full routes from GROUP2
  match ip address prefix-list FULL-ROUTESv4
!
! Outbound route-map to send default route to groups
route-map ToGROUPs-out permit 5
  description Send default route to groups
!
! eBGP for Transit Router (AS121)
! Peering with Group1 (AS10) and Group2 (AS20)
router bgp 121
  bgp router-id 100.121.1.0
  bgp bestpath as-path multipath-relax
  !
  ! eBGP neighbor to Group1-B1 (AS10)
  neighbor 100.121.1.1 remote-as 10
  neighbor 100.121.1.1 description eBGP to Group1-B1
  neighbor 100.121.1.1 route-map FromGROUP1v4-in in
  neighbor 100.121.1.1 route-map ToGROUPs-out out
  neighbor 100.121.1.1 default-originate
  !
  ! eBGP neighbor to Group2-B2 (AS20)
  neighbor 100.121.2.3 remote-as 20
  neighbor 100.121.2.3 description eBGP to Group2-B2
  neighbor 100.121.2.3 route-map FromGROUP2v4-in in
  neighbor 100.121.2.3 route-map ToGROUPs-out out
  neighbor 100.121.2.3 default-originate
  !
  address-family ipv4 unicast
    network 100.121.0.0/16
    network 100.121.1.0/32
    neighbor 100.121.1.1 activate
    neighbor 100.121.2.3 activate
  exit-address-family
!
! Static default route (simulating connection to Internet)
ip route 0.0.0.0/0 Null0
!
line vty
!
