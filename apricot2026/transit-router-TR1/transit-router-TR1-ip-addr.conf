!
! FRR Configuration for Transit-Router-TR1
! AS121, Transit ASN, eBGP with AS10 and AS20
!
hostname router-TR1
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.121.0.1/32
  ipv6 address 2001:18::1/128
!
! Interface eth1 to Group1-Router-B1
interface eth1
  ip address 100.121.1.0/31
  ipv6 address 2001:18:0:10::0/127
!
! Interface eth2 to Group2-Router-B2
interface eth2
  ip address 100.121.1.2/31
  ipv6 address 2001:18:0:11::0/127
!