!
! FRR Configuration for Group1-Router-Cust1
! Customer router in Group1 (AS65001)
!
hostname router-Cust1
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.1.35/32
  ipv6 address 2001:db8:1:35::1/128
!
! Interface eth1 to router-A1
interface eth1
  ip address 100.68.1.35/31
  ipv6 address 2001:db8:1:35::2/64
!
! eBGP to Group1-Router-A1 (AS10)
router bgp 65001
  bgp router-id 100.68.1.35
  !
  ! eBGP neighbor to A1 (AS10)
  neighbor 100.68.1.34 remote-as 10
  neighbor 100.68.1.34 description eBGP to A1
  !
  address-family ipv4 unicast
    network 100.68.1.35/32
    neighbor 100.68.1.34 activate
  exit-address-family
!
line vty
!
