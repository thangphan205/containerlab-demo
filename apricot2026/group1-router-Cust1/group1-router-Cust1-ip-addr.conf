!
! FRR Configuration for Group1-Router-Cust1
! Customer router in Group1 (AS65001)
!
hostname router-Cust1
password zebra
enable password zebra
!
! Loopback interface with router ID
interface lo
  ip address 100.68.1.5/32
  ipv6 address 2001:db8:1::5/128
!
! Interface eth1 to router-A1
interface eth1
  ip address 100.68.1.35/31
  ipv6 address 2001:db8:1:35::2/64
!
